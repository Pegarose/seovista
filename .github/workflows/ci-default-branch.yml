# SeoVista Sprint 0 — Default-Branch CI Gate
#
# Runs on pushes to main (and on schedule). Validates install, lint, typecheck,
# test (including real Docker PostgreSQL/Redis/BullMQ ping), build, Playwright e2e,
# axe accessibility, SEO, and Lighthouse. Mirrors the local release gate exactly.
#
# Design constraints (VAL-QUALITY-011):
# - Node 24 LTS and exact pnpm 10.30.1 via Corepack
# - Frozen install with lockfile-keyed cache
# - Canonical root scripts invoked in dependency order
# - No substitute/duplicate commands, reordered dependencies, filters skipping
#   validation, continue-on-error, success bypasses, unbounded services,
#   excessive browser concurrency, or missing timeouts

name: CI — Default Branch

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC to catch dependency or infrastructure regressions
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Install & Cache ─────────────────────────────────────────────
  install:
    name: Install (frozen lockfile)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm 10.30.1 via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Verify tool pins
        run: |
          node --version | grep -q '^v24\.' || (echo "ERROR: Node version mismatch" && exit 1)
          pnpm --version | grep -q '^10\.30\.1' || (echo "ERROR: pnpm version mismatch" && exit 1)

      - name: Compute lockfile cache key
        id: cache-key
        run: echo "key=pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Verify no lockfile changes
        run: |
          git diff --exit-code pnpm-lock.yaml || (echo "ERROR: pnpm-lock.yaml was modified during install" && exit 1)

  # ── Lint ────────────────────────────────────────────────────────
  lint:
    name: Lint (zero warnings)
    needs: [install]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # ── Typecheck ───────────────────────────────────────────────────
  typecheck:
    name: Typecheck (strict)
    needs: [install]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  # ── Test (includes Docker ping) ─────────────────────────────────
  test:
    name: Test (Vitest + Docker ping)
    needs: [install]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Start lifecycle-owned services
        id: lifecycle
        shell: bash
        run: |
          context_path="$(node scripts/infrastructure-lifecycle.js start seovista-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT})"
          echo "context_path=${context_path}" >> "$GITHUB_OUTPUT"
        timeout-minutes: 2

      - name: Test
        run: corepack pnpm test
        env:
          SEOVISTA_LIFECYCLE_CONTEXT_PATH: ${{ steps.lifecycle.outputs.context_path }}

      - name: Stop lifecycle-owned services
        if: always() && steps.lifecycle.outputs.context_path != ''
        run: node scripts/infrastructure-lifecycle.js teardown "${{ steps.lifecycle.outputs.context_path }}"
        timeout-minutes: 2

  # ── Build ───────────────────────────────────────────────────────
  build:
    name: Build (production)
    needs: [lint, typecheck, test]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify no tracked changes after build
        run: |
          git diff --exit-code || (echo "ERROR: Build produced tracked changes" && exit 1)

  # ── Playwright E2E ──────────────────────────────────────────────
  e2e:
    name: Playwright E2E (≤2 workers)
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: pnpm test:e2e

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            apps/web/tests/e2e-results/
            apps/web/test-results/
          retention-days: 7

  # ── Axe Accessibility ───────────────────────────────────────────
  a11y:
    name: Axe Accessibility
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run axe accessibility tests
        run: pnpm test:a11y

      - name: Upload accessibility artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-failure-artifacts
          path: |
            apps/web/tests/e2e-results/
            apps/web/test-results/
          retention-days: 7

  # ── SEO Validation ──────────────────────────────────────────────
  seo:
    name: SEO Validation
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run SEO tests
        run: pnpm test:seo

      - name: Upload SEO artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: seo-failure-artifacts
          path: |
            apps/web/tests/e2e-results/
            apps/web/test-results/
          retention-days: 7

  # ── Lighthouse ──────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI (Linux Chromium)
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.1 --activate

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ needs.install.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Install dependencies (frozen)
        run: corepack pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: pnpm lighthouse

      - name: Upload Lighthouse artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-failure-artifacts
          path: |
            .lighthouseci/
            apps/web/.lighthouseci/
          retention-days: 7

  # ── Release Gate Summary ────────────────────────────────────────
  gate:
    name: CI Gate Summary
    needs: [lint, typecheck, test, build, e2e, a11y, seo, lighthouse]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Check all required jobs
        run: |
          echo "=== CI Gate Summary ==="
          JOBS='${{ toJson(needs) }}'
          echo "Job results: $JOBS"
          FAILED=$(echo "$JOBS" | grep -c '"result":"failure"' || true)
          SKIPPED=$(echo "$JOBS" | grep -c '"result":"skipped"' || true)
          if [ "$FAILED" -gt 0 ] || [ "$SKIPPED" -gt 0 ]; then
            echo "ERROR: One or more required jobs failed or were skipped"
            exit 1
          fi
          echo "All CI gates passed"
